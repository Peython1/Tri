<script type="module">
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  getDoc,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.addEventListener("DOMContentLoaded", () => {
    // Ajuste os IDs abaixo para os mesmos IDs do seu HTML
    const inputCpf = document.getElementById("cpf");
    const inputCodigo = document.getElementById("codigo");
    const btnEntrar = document.getElementById("btnEntrar");

    // Verifica se os elementos foram encontrados
    if (!inputCpf) {
        alert('Campo CPF não encontrado. O input deve ter id="cpf".');
        return;
    }

    if (!inputCodigo) {
        alert('Campo Código não encontrado. O input deve ter id="codigo".');
        return;
    }

    if (!btnEntrar) {
        alert('Botão não encontrado. O botão deve ter id="btnEntrar".');
        return;
    }

    // Evento do botão
    btnEntrar.addEventListener("click", async (e) => {
        e.preventDefault(); // impede recarregar a página

        const cpf = inputCpf.value.replace(/\D/g, "").trim();
        const codigo = inputCodigo.value.trim();

        if (!cpf || !codigo) {
            alert("Preencha CPF e código de autenticação.");
            return;
        }

        try {
            // Busca no Firestore usando o CPF como ID do documento
            const docRef = doc(db, "alunos1", cpf);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                alert("CPF não encontrado no sistema.");
                return;
            }

            const dados = docSnap.data();

            // Verifica o código de autenticação
            if ((dados.codigoAutenticacao || "").trim() !== codigo) {
                alert("Código de autenticação inválido.");
                return;
            }

            // Salva o CPF na sessão para a próxima página
            sessionStorage.setItem("cpfConsulta", cpf);

            // Redireciona para a página de consulta
            window.location.href = "consultaalunos.html";

        } catch (erro) {
            console.error("Erro no login:", erro);
            alert("Erro ao consultar os dados. Abra o console (F12) para verificar.");
        }
    });
});
</script>
