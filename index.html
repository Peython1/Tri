<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel de Diplomas - Firebase</title>
    <!-- Bootstrap + FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Seus estilos locais (fallback) -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/personal.css">
    <link rel="stylesheet" href="css/navbar.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Roboto, sans-serif; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #0a2647 0%, #1e3a5f 100%); color: white; }
        .sidebar .nav-link { color: #ddd; padding: 0.8rem 1rem; border-radius: 8px; margin: 4px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #2c4e7a; color: white; }
        .sidebar .nav-link i { width: 25px; margin-right: 10px; }
        .main-content { padding: 20px; }
        .card-dashboard { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-consult { background-color: #17a2b8; color: white; border-radius: 20px; padding: 2px 12px; font-size: 0.8rem; }
        .login-container { max-width: 400px; margin: 100px auto; }
        footer { text-align: center; margin-top: 30px; color: #6c757d; font-size: 0.8rem; }
    </style>
</head>
<body>
<div id="app"></div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAHY_MyHcPvgNgDRD-NMCprA8IDn94oYY",
    authDomain: "diplomas-d9f5d.firebaseapp.com",
    projectId: "diplomas-d9f5d",
    storageBucket: "diplomas-d9f5d.firebasestorage.app",
    messagingSenderId: "465325614976",
    appId: "1:465325614976:web:8893495075344923fdc365"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Instituições pré-definidas
  const INSTITUTIONS = [
    { id: "anhanguera", nome: "Anhanguera" },
    { id: "estacio", nome: "Estácio" },
    { id: "unip", nome: "UNIP" },
    { id: "ibmec", nome: "IBMEC" },
    { id: "wyden", nome: "Wyden" },
    { id: "sistedu", nome: "SISTEDU" }
  ];

  // Gera código de autenticação de 6 dígitos
  function gerarCodigo() { return Math.floor(100000 + Math.random() * 900000).toString(); }

  // Renderização da tela de login
  function renderLogin() {
    return `
      <div class="login-container">
        <div class="card shadow">
          <div class="card-body">
            <h3 class="text-center mb-4">Painel de Diplomas</h3>
            <div id="login-error" class="alert alert-danger d-none"></div>
            <div class="mb-3">
              <label>E-mail</label>
              <input type="email" id="email" class="form-control" placeholder="seu@email.com">
            </div>
            <div class="mb-3">
              <label>Senha</label>
              <input type="password" id="password" class="form-control" placeholder="******">
            </div>
            <button id="btn-login" class="btn btn-primary w-100 mb-2">Entrar</button>
            <button id="btn-register" class="btn btn-secondary w-100">Criar conta</button>
          </div>
        </div>
      </div>
    `;
  }

  // Dashboard principal (menu lateral + conteúdo)
  function renderDashboard(user) {
    return `
      <div class="container-fluid p-0">
        <div class="row g-0">
          <!-- Sidebar -->
          <div class="col-auto sidebar p-0">
            <div class="d-flex flex-column p-3">
              <div class="text-center mb-4">
                <img src="images/logo-unip-vermelha-512.png" alt="Logo" width="50" onerror="this.src='https://via.placeholder.com/50'">
                <h5 class="mt-2">Olá, ${user.email.split('@')[0]}</h5>
              </div>
              <nav class="nav flex-column">
                <a href="#" class="nav-link" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <div class="mt-2 mb-1"><small class="text-secondary">INSTITUIÇÕES</small></div>
                <div id="institutions-list"></div>
                <hr class="bg-secondary">
                <a href="#" class="nav-link" data-page="all-students"><i class="fas fa-users"></i> Todos os Alunos</a>
                <a href="#" id="logout-btn" class="nav-link text-danger"><i class="fas fa-sign-out-alt"></i> Sair</a>
              </nav>
            </div>
          </div>
          <!-- Conteúdo -->
          <div class="col main-content" id="mainContent">
            <div class="text-center mt-5"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
          </div>
        </div>
        <footer>© 2026 - Painel de Gestão de Diplomas | v2.0 com Firebase</footer>
      </div>
    `;
  }

  // Páginas internas
  async function renderDashboardPage() {
    const alunosRef = collection(db, "clientes", auth.currentUser.uid, "alunos");
    const snapshot = await getDocs(alunosRef);
    const total = snapshot.size;
    return `
      <div class="d-flex justify-content-between flex-wrap pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Dashboard</h1>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <div class="card card-dashboard bg-primary text-white">
            <div class="card-body">
              <h5 class="card-title">Total de Alunos</h5>
              <h2>${total}</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card card-dashboard bg-success text-white">
            <div class="card-body">
              <h5 class="card-title">Instituições</h5>
              <h2>${INSTITUTIONS.length}</h2>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderCadastro(instId) {
    const inst = INSTITUTIONS.find(i => i.id === instId);
    return `
      <div class="pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Cadastrar Aluno - ${inst.nome}</h1>
      </div>
      <div class="card">
        <div class="card-body">
          <form id="formCadastro">
            <input type="hidden" id="instituicao" value="${instId}">
            <div class="row">
              <div class="col-md-6 mb-3"><label>Nome Completo *</label><input type="text" id="nome" class="form-control" required></div>
              <div class="col-md-6 mb-3"><label>CPF *</label><input type="text" id="cpf" class="form-control" required></div>
              <div class="col-md-4 mb-3"><label>Endereço</label><input type="text" id="endereco" class="form-control"></div>
              <div class="col-md-2 mb-3"><label>Número</label><input type="text" id="numero" class="form-control"></div>
              <div class="col-md-3 mb-3"><label>Bairro</label><input type="text" id="bairro" class="form-control"></div>
              <div class="col-md-3 mb-3"><label>Cidade</label><input type="text" id="cidade" class="form-control"></div>
              <div class="col-md-2 mb-3"><label>Estado</label><input type="text" id="estado" class="form-control"></div>
              <div class="col-md-6 mb-3"><label>Curso de Formação *</label><input type="text" id="curso" class="form-control" required></div>
              <div class="col-md-6 mb-3"><label>Universidade *</label><input type="text" id="universidade" class="form-control" value="${inst.nome}" required></div>
              <div class="col-md-4 mb-3"><label>Data Conclusão</label><input type="date" id="dataConclusao" class="form-control"></div>
              <div class="col-md-4 mb-3"><label>Código Autenticação</label><input type="text" id="codigo" class="form-control" readonly value="${gerarCodigo()}"></div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar Aluno</button>
            <a href="#" class="btn btn-secondary" data-page="all-students">Cancelar</a>
          </form>
        </div>
      </div>
    `;
  }

  async function renderAllStudents() {
    const alunosRef = collection(db, "clientes", auth.currentUser.uid, "alunos");
    const snapshot = await getDocs(alunosRef);
    if (snapshot.empty) return `<div class="alert alert-warning">Nenhum aluno cadastrado.</div>`;
    let html = `<div class="pt-3 pb-2 mb-3 border-bottom"><h1 class="h2">Todos os Alunos</h1></div>
                <div class="table-responsive"><table class="table table-hover">
                <thead><tr><th>Nome</th><th>CPF</th><th>Instituição</th><th>Curso</th><th>Ações</th></tr></thead><tbody>`;
    snapshot.forEach(doc => {
      const a = doc.data();
      html += `<tr>
                <td>${a.nome}</td>
                <td>${a.cpf}</td>
                <td>${a.instituicao}</td>
                <td>${a.curso}</td>
                <td><button class="btn btn-consult btn-sm" data-cpf="${a.cpf}" data-codigo="${a.codigoAutenticacao}" onclick="window.consultarAluno('${a.cpf}','${a.codigoAutenticacao}')"><i class="fas fa-search"></i> Consultar</button></td>
              </tr>`;
    });
    html += `</tbody></table></div>`;
    return html;
  }

  async function salvarAluno(dados) {
    const alunosRef = collection(db, "clientes", auth.currentUser.uid, "alunos");
    await addDoc(alunosRef, dados);
  }

  function modalConsulta(cpf, codigo, alunoData) {
    const html = `
      <div class="modal fade" id="consultaModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title">Consulta - ${alunoData.nome}</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
              <ul class="nav nav-tabs" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#sistedu">SISTEDU</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#mec">MEC</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#portal">Portal do Aluno</button></li>
              </ul>
              <div class="tab-content mt-3">
                <div class="tab-pane fade show active" id="sistedu">${renderConsultaSimulada(alunoData, "SISTEDU")}</div>
                <div class="tab-pane fade" id="mec">${renderConsultaSimulada(alunoData, "MEC")}</div>
                <div class="tab-pane fade" id="portal">${renderConsultaSimulada(alunoData, "Portal")}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', html);
    const modal = new bootstrap.Modal(document.getElementById('consultaModal'));
    modal.show();
    document.getElementById('consultaModal').addEventListener('hidden.bs.modal', () => document.getElementById('consultaModal').remove());
  }

  function renderConsultaSimulada(aluno, sistema) {
    return `<div class="card"><div class="card-body">
      <p><strong>Nome:</strong> ${aluno.nome}</p>
      <p><strong>CPF:</strong> ${aluno.cpf}</p>
      <p><strong>Curso:</strong> ${aluno.curso}</p>
      <p><strong>Universidade:</strong> ${aluno.universidade}</p>
      <p><strong>Data Conclusão:</strong> ${aluno.dataConclusao || 'Não informada'}</p>
      <p><strong>Status:</strong> <span class="badge bg-success">Registro ativo no ${sistema}</span></p>
      <p><small>Código autenticação: ${aluno.codigoAutenticacao}</small></p>
    </div></div>`;
  }

  // Eventos e navegação
  function attachEvents() {
    document.querySelectorAll("[data-page]").forEach(link => {
      link.addEventListener("click", async (e) => {
        e.preventDefault();
        const page = link.getAttribute("data-page");
        if (page === "dashboard") document.getElementById("mainContent").innerHTML = await renderDashboardPage();
        else if (page === "all-students") document.getElementById("mainContent").innerHTML = await renderAllStudents();
        else if (page === "cadastro") {
          const inst = link.getAttribute("data-inst");
          document.getElementById("mainContent").innerHTML = renderCadastro(inst);
          document.getElementById("formCadastro").addEventListener("submit", async (e) => {
            e.preventDefault();
            const aluno = {
              nome: document.getElementById("nome").value,
              cpf: document.getElementById("cpf").value,
              endereco: document.getElementById("endereco").value,
              numero: document.getElementById("numero").value,
              bairro: document.getElementById("bairro").value,
              cidade: document.getElementById("cidade").value,
              estado: document.getElementById("estado").value,
              curso: document.getElementById("curso").value,
              universidade: document.getElementById("universidade").value,
              dataConclusao: document.getElementById("dataConclusao").value,
              instituicao: document.getElementById("instituicao").value,
              codigoAutenticacao: document.getElementById("codigo").value
            };
            if (!aluno.nome || !aluno.cpf || !aluno.curso) return alert("Preencha nome, CPF e curso.");
            await salvarAluno(aluno);
            alert("Aluno salvo!");
            document.querySelector("[data-page='all-students']").click();
          });
        }
      });
    });
    document.getElementById("logout-btn")?.addEventListener("click", () => signOut(auth));
    window.consultarAluno = async (cpf, codigo) => {
      const q = query(collection(db, "clientes", auth.currentUser.uid, "alunos"), where("cpf", "==", cpf));
      const snap = await getDocs(q);
      if (snap.empty) return alert("Aluno não encontrado");
      modalConsulta(cpf, codigo, snap.docs[0].data());
    };
  }

  function buildSidebar() {
    const container = document.getElementById("institutions-list");
    container.innerHTML = "";
    INSTITUTIONS.forEach(inst => {
      const a = document.createElement("a");
      a.href = "#";
      a.className = "nav-link";
      a.setAttribute("data-page", "cadastro");
      a.setAttribute("data-inst", inst.id);
      a.innerHTML = `<i class="fas fa-university"></i> ${inst.nome}`;
      container.appendChild(a);
    });
  }

  // Controle de autenticação
  onAuthStateChanged(auth, (user) => {
    const appDiv = document.getElementById("app");
    if (user) {
      appDiv.innerHTML = renderDashboard(user);
      buildSidebar();
      attachEvents();
      document.querySelector("[data-page='dashboard']").click();
    } else {
      appDiv.innerHTML = renderLogin();
      document.getElementById("btn-login").addEventListener("click", async () => {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        try {
          await signInWithEmailAndPassword(auth, email, pass);
        } catch (err) {
          document.getElementById("login-error").classList.remove("d-none");
          document.getElementById("login-error").innerText = err.message;
        }
      });
      document.getElementById("btn-register").addEventListener("click", async () => {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        try {
          await createUserWithEmailAndPassword(auth, email, pass);
        } catch (err) {
          document.getElementById("login-error").classList.remove("d-none");
          document.getElementById("login-error").innerText = err.message;
        }
      });
    }
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
